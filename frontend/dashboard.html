<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Network-Traffix — Incident Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"
      crossorigin
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"
      crossorigin
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
      :root {
        /* --- Base tokens, lifted directly from design.md --- */
        --color-bg: #e9e9e9;
        --color-black: #111111;
        --color-blue: #3b82f6;
        --color-highlight: #bfe3f5;

        /* --- Extensions needed for a working console (kept muted / low-saturation
         to stay inside the "restrained, near-monochrome + one accent" rule) --- */
        --color-surface: #ffffff;
        --color-surface-2: #f4f4f4;
        --color-line: #d8d8d8;
        --color-muted: #6b6b6b;

        --sev-low: #6c7a89;
        --sev-low-bg: #e4e7ea;
        --sev-medium: #a9791f;
        --sev-medium-bg: #f1e4c4;
        --sev-high: #b45a2a;
        --sev-high-bg: #f1dcc9;
        --sev-critical: #a73b3b;
        --sev-critical-bg: #f0d6d6;

        --font-ui: "Inter", -apple-system, sans-serif;
        --font-display: "Fraunces", Georgia, serif;

        --radius-s: 6px;
        --radius-m: 10px;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--color-bg);
        color: var(--color-black);
        font-family: var(--font-ui);
        -webkit-font-smoothing: antialiased;
      }
      #root {
        min-height: 100vh;
      }

      .app-shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px 24px 80px;
      }

      /* ---------- "Screenshot chrome" header, per design.md section 3 ---------- */
      .chrome {
        background: var(--color-surface);
        border: 1px solid var(--color-line);
        border-radius: var(--radius-m);
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
      }
      .chrome-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--color-black);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.02em;
      }
      .handle-block {
        display: flex;
        flex-direction: column;
        line-height: 1.2;
      }
      .handle {
        font-size: 13px;
        font-weight: 600;
        color: var(--color-black);
      }
      .subhandle {
        font-size: 11.5px;
        color: var(--color-muted);
      }
      .chrome-right {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .live-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--color-blue);
        color: #fff;
        font-size: 12px;
        font-weight: 600;
        padding: 7px 14px;
        border-radius: 999px;
        border: none;
        cursor: default;
      }
      .live-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #fff;
        animation: pulse 1.8s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      .toolbar-dots {
        display: flex;
        gap: 4px;
      }
      .toolbar-dots span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--color-muted);
        display: block;
      }

      /* ---------- Hero headline, mixed-weight 3-liner ---------- */
      .hero {
        padding: 4px 4px 26px;
      }
      .hero h1 {
        font-family: var(--font-ui);
        font-weight: 600;
        font-size: 34px;
        line-height: 1.18;
        margin: 0;
        letter-spacing: -0.01em;
      }
      .hero .accent {
        font-family: var(--font-display);
        font-style: italic;
        font-weight: 700;
        background: var(--color-highlight);
        padding: 0 8px;
        border-radius: 4px;
        box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
      }
      .hero p {
        margin: 12px 0 0;
        color: var(--color-muted);
        font-size: 14.5px;
        max-width: 640px;
      }

      /* ---------- Dotted annotation callout ---------- */
      .annotation {
        position: relative;
        margin: 20px 2px 28px;
        padding: 16px 18px;
        border: 1.5px dashed #9aa0a6;
        border-radius: var(--radius-s);
        background: rgba(255, 255, 255, 0.5);
        max-width: 560px;
      }
      .annotation .corner {
        position: absolute;
        width: 7px;
        height: 7px;
        border: 1.5px solid var(--color-blue);
        background: #fff;
      }
      .annotation .corner.tl {
        top: -4.5px;
        left: -4.5px;
      }
      .annotation .corner.tr {
        top: -4.5px;
        right: -4.5px;
      }
      .annotation .corner.bl {
        bottom: -4.5px;
        left: -4.5px;
      }
      .annotation .corner.br {
        bottom: -4.5px;
        right: -4.5px;
      }
      .annotation-label {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-blue);
        font-weight: 700;
        margin-bottom: 6px;
      }
      .annotation p {
        margin: 0;
        font-size: 14px;
        line-height: 1.5;
      }

      /* ---------- Stat cards ---------- */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        margin-bottom: 22px;
      }
      .stat-card {
        background: var(--color-surface);
        border: 1px solid var(--color-line);
        border-radius: var(--radius-m);
        padding: 14px 16px;
      }
      .stat-card .num {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 26px;
        display: inline-block;
      }
      .stat-card.is-critical .num {
        background: var(--color-highlight);
        padding: 0 6px;
        border-radius: 4px;
      }
      .stat-card .label {
        display: block;
        margin-top: 4px;
        font-size: 11.5px;
        color: var(--color-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* ---------- Filter bar ---------- */
      .filter-bar {
        background: var(--color-surface);
        border: 1px solid var(--color-line);
        border-radius: var(--radius-m);
        padding: 14px 16px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .chip {
        font-family: var(--font-ui);
        font-size: 12.5px;
        font-weight: 600;
        padding: 7px 13px;
        border-radius: 999px;
        border: 1px solid var(--color-line);
        background: var(--color-surface-2);
        color: var(--color-black);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition:
          border-color 0.12s,
          background 0.12s;
      }
      .chip:hover {
        border-color: var(--color-blue);
      }
      .chip.active {
        background: var(--color-black);
        color: #fff;
        border-color: var(--color-black);
      }
      .chip.active.sev-low {
        background: var(--sev-low);
        border-color: var(--sev-low);
      }
      .chip.active.sev-medium {
        background: var(--sev-medium);
        border-color: var(--sev-medium);
      }
      .chip.active.sev-high {
        background: var(--sev-high);
        border-color: var(--sev-high);
      }
      .chip.active.sev-critical {
        background: var(--sev-critical);
        border-color: var(--sev-critical);
      }
      .chip-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
      }

      .search-input,
      .select-input {
        font-family: var(--font-ui);
        font-size: 13px;
        padding: 8px 12px;
        border-radius: var(--radius-s);
        border: 1px solid var(--color-line);
        background: var(--color-surface-2);
        color: var(--color-black);
      }
      .search-input {
        flex: 1;
        min-width: 180px;
      }
      .search-input:focus,
      .select-input:focus,
      .chip:focus-visible {
        outline: 2px solid var(--color-blue);
        outline-offset: 1px;
      }
      .clear-btn {
        font-size: 12.5px;
        font-weight: 600;
        color: var(--color-blue);
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px 4px;
      }

      /* ---------- Table ---------- */
      .table-card {
        background: var(--color-surface);
        border: 1px solid var(--color-line);
        border-radius: var(--radius-m);
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        text-align: left;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--color-muted);
        font-weight: 600;
        padding: 12px 14px;
        border-bottom: 1px solid var(--color-line);
        background: var(--color-surface-2);
      }
      tbody td {
        padding: 12px 14px;
        font-size: 13px;
        border-bottom: 1px solid var(--color-line);
        vertical-align: middle;
      }
      tbody tr {
        cursor: pointer;
      }
      tbody tr:hover {
        background: #fafafa;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      .mono {
        font-family: "SFMono-Regular", ui-monospace, Menlo, monospace;
        font-size: 12.5px;
      }

      .sev-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        padding: 4px 9px;
        border-radius: 999px;
      }
      .sev-badge.low {
        background: var(--sev-low-bg);
        color: var(--sev-low);
      }
      .sev-badge.medium {
        background: var(--sev-medium-bg);
        color: var(--sev-medium);
      }
      .sev-badge.high {
        background: var(--sev-high-bg);
        color: var(--sev-high);
      }
      .sev-badge.critical {
        background: var(--sev-critical-bg);
        color: var(--sev-critical);
      }

      .status-pill {
        font-size: 11.5px;
        font-weight: 600;
        padding: 4px 9px;
        border-radius: 999px;
        background: var(--color-surface-2);
        color: var(--color-muted);
        border: 1px solid var(--color-line);
      }

      .empty-state {
        padding: 48px 24px;
        text-align: center;
        color: var(--color-muted);
        font-size: 13.5px;
      }

      /* ---------- Expanded explainability row ---------- */
      .explain-row td {
        background: #fbfbfb;
        padding: 16px 20px 22px;
      }
      .explain-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--color-muted);
        font-weight: 700;
        margin-bottom: 10px;
      }
      .feature-bar-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }
      .feature-name {
        width: 150px;
        font-size: 12.5px;
        color: var(--color-black);
        flex-shrink: 0;
      }
      .feature-track {
        flex: 1;
        height: 8px;
        background: var(--color-line);
        border-radius: 4px;
        overflow: hidden;
      }
      .feature-fill {
        height: 100%;
        background: var(--color-blue);
        border-radius: 4px;
      }
      .feature-pct {
        width: 42px;
        text-align: right;
        font-size: 12px;
        color: var(--color-muted);
        flex-shrink: 0;
      }

      .footnote {
        margin-top: 26px;
        font-size: 12px;
        color: var(--color-muted);
        text-align: center;
      }

      @media (max-width: 860px) {
        .stats-row {
          grid-template-columns: repeat(2, 1fr);
        }
        .hero h1 {
          font-size: 26px;
        }
        thead {
          display: none;
        }
        table,
        tbody,
        tr,
        td {
          display: block;
          width: 100%;
        }
        tbody tr {
          border-bottom: 1px solid var(--color-line);
          padding: 10px 4px;
        }
        tbody td {
          border-bottom: none;
          padding: 4px 10px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      const { useState, useMemo, useEffect } = React;

      /* =====================================================================
   API LAYER
   Talks to the FastAPI backend (backend/main.py). If it can't be reached
   — not running yet, wrong port, CORS misconfigured — this quietly falls
   back to generated mock data so the UI never goes blank while you're
   wiring things up. Watch the console for a warning when that happens.
   ===================================================================== */

      const API_BASE = "http://127.0.0.1:8000";

      const ATTACK_TYPES = [
        "DDoS",
        "DoS",
        "Port Scan",
        "Brute Force",
        "Botnet",
        "Web Attack",
        "Infiltration",
      ];
      const SEVERITIES = ["low", "medium", "high", "critical"];
      const STATUSES = ["new", "investigating", "resolved"];
      const FEATURE_POOL = [
        "Flow Duration",
        "Fwd Packet Length Mean",
        "Bwd Packets/s",
        "SYN Flag Count",
        "Packet Length Std",
        "Flow IAT Mean",
        "Total Fwd Packets",
        "Down/Up Ratio",
        "Active Mean",
        "Fwd PSH Flags",
      ];

      function randInt(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }
      function randIp() {
        return `${randInt(10, 203)}.${randInt(0, 255)}.${randInt(0, 255)}.${randInt(1, 254)}`;
      }
      function pick(arr) {
        return arr[randInt(0, arr.length - 1)];
      }

      function genExplanation() {
        const feats = [...FEATURE_POOL]
          .sort(() => Math.random() - 0.5)
          .slice(0, 3);
        let remaining = 100;
        return feats
          .map((f, i) => {
            const val =
              i === feats.length - 1
                ? remaining
                : randInt(10, Math.floor(remaining / 1.5));
            remaining -= val;
            return { feature: f, contribution: val };
          })
          .sort((a, b) => b.contribution - a.contribution);
      }

      function genMockIncidents(n) {
        const now = Date.now();
        return Array.from({ length: n })
          .map((_, i) => {
            const severity = pick(SEVERITIES);
            const conf =
              severity === "critical"
                ? randInt(88, 99)
                : severity === "high"
                  ? randInt(72, 92)
                  : severity === "medium"
                    ? randInt(45, 80)
                    : randInt(20, 60);
            return {
              id: `INC-${(1000 + i).toString()}`,
              timestamp: new Date(
                now - randInt(0, 60 * 60 * 36) * 1000,
              ).toISOString(),
              src_ip: randIp(),
              dst_ip: randIp(),
              protocol: pick(["TCP", "UDP", "ICMP"]),
              attack_type: pick(ATTACK_TYPES),
              severity,
              confidence: conf,
              status: pick(STATUSES),
              packet_count: randInt(12, 48000),
              explanation: genExplanation(),
            };
          })
          .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      }

      const MOCK_INCIDENTS = genMockIncidents(42);

      let usingMockData = false;

      async function fetchIncidents() {
        try {
          const res = await fetch(`${API_BASE}/api/incidents?limit=500`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          return data.items;
        } catch (err) {
          console.warn(
            "Backend unreachable, falling back to mock incidents:",
            err.message,
          );
          usingMockData = true;
          await new Promise((r) => setTimeout(r, 200));
          return MOCK_INCIDENTS;
        }
      }

      async function fetchSummary() {
        try {
          const res = await fetch(`${API_BASE}/api/summary`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.json();
        } catch (err) {
          usingMockData = true;
          const bySeverity = Object.fromEntries(
            SEVERITIES.map((s) => [
              s,
              MOCK_INCIDENTS.filter((i) => i.severity === s).length,
            ]),
          );
          return { total: MOCK_INCIDENTS.length, ...bySeverity };
        }
      }

      // The list endpoint omits `explanation` to stay light; fetch it on demand
      // when a row is expanded.
      async function fetchIncidentDetail(id) {
        try {
          const res = await fetch(`${API_BASE}/api/incidents/${id}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.json();
        } catch (err) {
          const mock = MOCK_INCIDENTS.find((i) => i.id === id);
          return mock || null;
        }
      }

      /* ===================================================================== */

      function timeAgo(iso) {
        const diffMs = Date.now() - new Date(iso).getTime();
        const mins = Math.floor(diffMs / 60000);
        if (mins < 1) return "just now";
        if (mins < 60) return `${mins}m ago`;
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return `${hrs}h ago`;
        return `${Math.floor(hrs / 24)}d ago`;
      }

      function SeverityBadge({ level }) {
        return <span className={`sev-badge ${level}`}>{level}</span>;
      }

      function FilterBar({
        activeSeverities,
        toggleSeverity,
        search,
        setSearch,
        attackType,
        setAttackType,
        onClear,
      }) {
        return (
          <div className="filter-bar">
            {SEVERITIES.map((sev) => (
              <button
                key={sev}
                className={`chip sev-${sev} ${activeSeverities.includes(sev) ? "active" : ""}`}
                onClick={() => toggleSeverity(sev)}
              >
                <span
                  className="chip-dot"
                  style={{ background: `var(--sev-${sev})` }}
                ></span>
                {sev}
              </button>
            ))}
            <input
              className="search-input"
              placeholder="Search by IP address…"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
            />
            <select
              className="select-input"
              value={attackType}
              onChange={(e) => setAttackType(e.target.value)}
            >
              <option value="all">All attack types</option>
              {ATTACK_TYPES.map((t) => (
                <option key={t} value={t}>
                  {t}
                </option>
              ))}
            </select>
            {(activeSeverities.length > 0 ||
              search ||
              attackType !== "all") && (
              <button className="clear-btn" onClick={onClear}>
                Clear filters
              </button>
            )}
          </div>
        );
      }

      function ExplainRow({ explanation }) {
        return (
          <tr className="explain-row">
            <td colSpan={8}>
              <div className="explain-title">
                Why this was flagged — top contributing features
              </div>
              {!explanation && (
                <div style={{ fontSize: "13px", color: "var(--color-muted)" }}>
                  Loading explanation…
                </div>
              )}
              {explanation &&
                explanation.map((f) => (
                  <div className="feature-bar-row" key={f.feature}>
                    <div className="feature-name">{f.feature}</div>
                    <div className="feature-track">
                      <div
                        className="feature-fill"
                        style={{ width: `${f.contribution}%` }}
                      ></div>
                    </div>
                    <div className="feature-pct">{f.contribution}%</div>
                  </div>
                ))}
            </td>
          </tr>
        );
      }

      function IncidentsTable({
        incidents,
        expandedId,
        onExpand,
        explanations,
      }) {
        if (incidents.length === 0) {
          return (
            <div className="table-card">
              <div className="empty-state">
                No incidents match these filters. Try widening your search.
              </div>
            </div>
          );
        }
        return (
          <div className="table-card">
            <table>
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Source IP</th>
                  <th>Destination IP</th>
                  <th>Protocol</th>
                  <th>Attack type</th>
                  <th>Risk</th>
                  <th>Confidence</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                {incidents.map((inc) => (
                  <React.Fragment key={inc.id}>
                    <tr onClick={() => onExpand(inc.id)}>
                      <td>{timeAgo(inc.timestamp)}</td>
                      <td className="mono">{inc.src_ip}</td>
                      <td className="mono">{inc.dst_ip}</td>
                      <td>{inc.protocol}</td>
                      <td>{inc.attack_type}</td>
                      <td>
                        <SeverityBadge level={inc.severity} />
                      </td>
                      <td>{inc.confidence}%</td>
                      <td>
                        <span className="status-pill">{inc.status}</span>
                      </td>
                    </tr>
                    {expandedId === inc.id && (
                      <ExplainRow explanation={explanations[inc.id]} />
                    )}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
          </div>
        );
      }

      function App() {
        const [incidents, setIncidents] = useState([]);
        const [summary, setSummary] = useState(null);
        const [loading, setLoading] = useState(true);
        const [activeSeverities, setActiveSeverities] = useState([]);
        const [search, setSearch] = useState("");
        const [attackType, setAttackType] = useState("all");
        const [expandedId, setExpandedId] = useState(null);
        const [explanations, setExplanations] = useState({});

        useEffect(() => {
          fetchIncidents().then((data) => {
            setIncidents(data);
            setLoading(false);
          });
          fetchSummary().then(setSummary);
        }, []);

        function handleExpand(id) {
          if (expandedId === id) {
            setExpandedId(null);
            return;
          }
          setExpandedId(id);
          if (!explanations[id]) {
            fetchIncidentDetail(id).then((detail) => {
              if (detail && detail.explanation) {
                setExplanations((prev) => ({
                  ...prev,
                  [id]: detail.explanation,
                }));
              }
            });
          }
        }

        function toggleSeverity(sev) {
          setActiveSeverities((prev) =>
            prev.includes(sev) ? prev.filter((s) => s !== sev) : [...prev, sev],
          );
        }
        function clearFilters() {
          setActiveSeverities([]);
          setSearch("");
          setAttackType("all");
        }

        const filtered = useMemo(() => {
          return incidents.filter((inc) => {
            if (
              activeSeverities.length &&
              !activeSeverities.includes(inc.severity)
            )
              return false;
            if (attackType !== "all" && inc.attack_type !== attackType)
              return false;
            if (search) {
              const q = search.toLowerCase();
              if (!inc.src_ip.includes(q) && !inc.dst_ip.includes(q))
                return false;
            }
            return true;
          });
        }, [incidents, activeSeverities, search, attackType]);

        return (
          <div className="app-shell">
            <div className="chrome">
              <div className="chrome-left">
                <div className="avatar">NT</div>
                <div className="handle-block">
                  <span className="handle">Network-Traffix</span>
                  <span className="subhandle">
                    @security-ops · analyst console
                  </span>
                </div>
              </div>
              <div className="chrome-right">
                <button className="live-pill">
                  <span className="live-dot"></span>Live
                </button>
                <div className="toolbar-dots">
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
              </div>
            </div>

            <div className="hero">
              <h1>
                ALL HIGH-RISK TRAFFIC
                <br />
                leaves behind a <span className="accent">pattern</span>
                <br />
                before it becomes a breach.
              </h1>
              <p>
                Explainable, real-time detection across your network — every
                alert comes with the features that triggered it, so analysts
                trust the call, not just the score.
              </p>
            </div>

            <div className="annotation">
              <span className="corner tl"></span>
              <span className="corner tr"></span>
              <span className="corner bl"></span>
              <span className="corner br"></span>
              <div className="annotation-label">Analyst note</div>
              <p>
                Most of today's critical flags trace back to a SYN-flood pattern
                from a small cluster of source subnets — worth a firewall rule
                review.
              </p>
            </div>

            {summary && (
              <div className="stats-row">
                <div className="stat-card">
                  <span className="num">{summary.total}</span>
                  <span className="label">Total incidents</span>
                </div>
                <div className="stat-card">
                  <span className="num">{summary.low}</span>
                  <span className="label">Low</span>
                </div>
                <div className="stat-card">
                  <span className="num">{summary.medium}</span>
                  <span className="label">Medium</span>
                </div>
                <div className="stat-card">
                  <span className="num">{summary.high}</span>
                  <span className="label">High</span>
                </div>
                <div className="stat-card is-critical">
                  <span className="num">{summary.critical}</span>
                  <span className="label">Critical</span>
                </div>
              </div>
            )}

            <FilterBar
              activeSeverities={activeSeverities}
              toggleSeverity={toggleSeverity}
              search={search}
              setSearch={setSearch}
              attackType={attackType}
              setAttackType={setAttackType}
              onClear={clearFilters}
            />

            {loading ? (
              <div className="table-card">
                <div className="empty-state">Loading incidents…</div>
              </div>
            ) : (
              <IncidentsTable
                incidents={filtered}
                expandedId={expandedId}
                onExpand={handleExpand}
                explanations={explanations}
              />
            )}

            <div className="footnote">
              Showing {filtered.length} of {incidents.length} incidents
              {usingMockData
                ? " · backend unreachable, showing mock data"
                : " · live from FastAPI"}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
